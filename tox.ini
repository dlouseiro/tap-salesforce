[tox]
envlist = lint, format, py310, py311, py312, py313
isolated_build = true
skip_missing_interpreters = true

[testenv]
description = Run the test suite
extras = browser
deps = pytest
commands = pytest tests/ -v

[testenv:lint]
description = Lint + format check (ruff)
skip_install = true
deps = ruff
commands =
    ruff check tap_salesforce tests
    ruff format --check tap_salesforce tests

[testenv:format]
description = Format & lint check (prettier, yamllint, markdownlint via pre-commit)
skip_install = true
deps = pre-commit
commands =
    pre-commit run prettier --all-files
    pre-commit run yamllint --all-files
    pre-commit run markdownlint --all-files
