[tox]
envlist = lint, py310, py311, py312, py313
isolated_build = true
skip_missing_interpreters = true

[testenv]
description = Run the test suite
extras = browser
deps = pytest
commands = pytest tests/ -v

[testenv:lint]
description = Lint + format check (matches CI and the pre-commit hooks)
skip_install = true
deps = ruff
commands =
    ruff check tap_salesforce tests
    ruff format --check tap_salesforce tests
