name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: snok/install-poetry@v1
        with:
          version: "1.8.5"
          virtualenvs-in-project: true
      - name: Cache poetry-managed virtualenv
        uses: actions/cache@v6
        with:
          path: .venv
          key: venv-${{ runner.os }}-3.12-${{ hashFiles('poetry.lock') }}
      - name: Install dev dependencies
        run: poetry install --only dev
      - name: ruff check
        run: poetry run ruff check tap_salesforce tests
      - name: ruff format --check
        run: poetry run ruff format --check tap_salesforce tests

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: snok/install-poetry@v1
        with:
          version: "1.8.5"
          virtualenvs-in-project: true
      - name: Cache poetry-managed virtualenv
        uses: actions/cache@v6
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}
      - name: Install package + dev dependencies + all extras
        run: poetry install --with dev --all-extras
      - name: Check for dependency conflicts
        run: poetry check
      - name: Run tests
        run: poetry run pytest tests/ -v
