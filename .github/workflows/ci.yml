name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff, via tox)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install tox
        run: pip install tox
      - name: tox -e lint
        run: tox -e lint

  test:
    name: Test (Python ${{ matrix.python-version }}, via tox)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install tox
        run: pip install tox
      - name: tox -e py${{ matrix.python-version }}
        run: tox -e "py$(echo ${{ matrix.python-version }} | tr -d '.')"
